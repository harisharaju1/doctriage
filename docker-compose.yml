services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    # .env is shared with local `pnpm dev` runs (which connect to Postgres via
    # the published "localhost:5432" below). Inside this Docker network,
    # "localhost" would mean "this app container", not the postgres container
    # — so we override POSTGRES_URL here with the Docker service-name hostname
    # ("postgres"), which only resolves correctly from inside the network.
    # `environment:` values take precedence over the same key loaded from `env_file`.
    environment:
      POSTGRES_URL: postgresql://doctriage:doctriage@postgres:5432/doctriage
    depends_on:
      postgres: { condition: service_healthy }
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: doctriage
      POSTGRES_PASSWORD: doctriage
      POSTGRES_DB: doctriage
    # Publish Postgres to the host so `pnpm dev` (running directly on your
    # machine, outside Docker) can reach it at localhost:5432. Without this,
    # Postgres would only be reachable from other containers on the Compose
    # network — fine for the containerized `app` service, useless for local iteration.
    #
    # Bound to 127.0.0.1 ONLY — not "5432:5432" (which binds 0.0.0.0, every
    # network interface). This same docker-compose.yml also runs on the VPS
    # via the GitHub Actions deploy workflow, and Docker manipulates iptables
    # directly when publishing a port — it's a well-known gotcha that this can
    # bypass ufw's rules entirely, even when `ufw status` claims the port is
    # blocked. Binding to loopback means Postgres (with its default
    # doctriage/doctriage credentials right above) is reachable from
    # localhost only — your Mac for local dev, or the VPS itself over SSH —
    # and never from the public internet, regardless of firewall config.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doctriage"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  mongodata:
  redisdata:
  uploads:
